<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MOM スプライト確認</title>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
  h2 { margin: 0 0 8px; font-size: 14px; color: #aaa; }
  p  { margin: 4px 0; font-size: 12px; color: #777; }
</style>
</head>
<body>
<h2>MOM / DAD 比較プレビュー</h2>
<div id="game"></div>
<p style="color:#88ffcc;">確定値 ── MOM 横歩き: 105px　MOM 正面: 115px　DAD: 100px（固定）　赤線 = 足元基準</p>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const CELL = 64;
const DAD_SCALE = 100 / 256;
const MOM_RIGHT_H    = 105;  // 横歩き：確定値
const MOM_DOWN_H     = 115;  // 正面：確定値
const MOM_RIGHT_SCALE = MOM_RIGHT_H / 689;
const MOM_DOWN_SCALE  = MOM_DOWN_H  / 780;

class PreviewScene extends Phaser.Scene {
  constructor() { super('Preview'); }

  preload() {
    this.load.spritesheet('mom_right', 'assets/sprites/zombie/MAM/walk_right.png', {
      frameWidth: 410, frameHeight: 689,
    });
    this.load.spritesheet('mom_down', 'assets/sprites/zombie/MAM/walk_down.png', {
      frameWidth: 368, frameHeight: 780,
    });
    this.load.spritesheet('dad_right', 'assets/sprites/zombie/DAD/dad_142_sheet.png', {
      frameWidth: 256, frameHeight: 256,
    });
    this.load.spritesheet('dad_down', 'assets/sprites/zombie/DAD/dad_down.png', {
      frameWidth: 256, frameHeight: 256,
    });
  }

  create() {
    const W = this.scale.width;
    const H = this.scale.height;

    // 背景
    this.add.rectangle(0, 0,        W, H * 0.58, 0x4a7c3f).setOrigin(0, 0); // 草
    this.add.rectangle(0, H * 0.58, W, H * 0.28, 0x555555).setOrigin(0, 0); // 道路
    this.add.rectangle(0, H * 0.86, W, H * 0.14, 0x4a7c3f).setOrigin(0, 0); // 草（下）

    // グリッド線
    const g = this.add.graphics();
    g.lineStyle(1, 0xffffff, 0.07);
    for (let x = 0; x < W; x += CELL) g.lineBetween(x, 0, x, H);
    for (let y = 0; y < H; y += CELL) g.lineBetween(0, y, W, y);

    // 足元基準Y
    const footY = H * 0.65;

    // positionY 逆算（foot = posY + (1-oy)*frameH*scale）
    const momRightPosY = footY - (1 - 0.958) * 689 * MOM_RIGHT_SCALE;
    const momDownPosY  = footY;  // setOrigin(0.5,1.0) → foot = posY
    const dadPosY      = footY - (1 - 0.75) * 256 * DAD_SCALE;

    // ── MOM 横歩き アニメ ──
    this.anims.create({
      key: 'mom_walk_right',
      frames: this.anims.generateFrameNumbers('mom_right', { frames: [3, 2, 4, 2] }),
      frameRate: 3, repeat: -1,
    });

    // MOM 右向き
    this.add.sprite(W * 0.13, momRightPosY, 'mom_right')
      .setScale(MOM_RIGHT_SCALE).setOrigin(0.478, 0.958).setDepth(3)
      .play('mom_walk_right');

    // MOM 左向き（flipX）
    this.add.sprite(W * 0.33, momRightPosY, 'mom_right')
      .setScale(MOM_RIGHT_SCALE).setOrigin(0.478, 0.958).setDepth(3).setFlipX(true)
      .play('mom_walk_right');

    // ── MOM 正面歩き アニメ ──
    this.anims.create({
      key: 'mom_walk_down',
      frames: this.anims.generateFrameNumbers('mom_down', { frames: [3, 2, 1, 2] }),
      frameRate: 3, repeat: -1,
    });

    // MOM 正面
    this.add.sprite(W * 0.55, momDownPosY, 'mom_down')
      .setScale(MOM_DOWN_SCALE).setOrigin(0.5, 1.0).setDepth(3)
      .play('mom_walk_down');

    // ── DAD ──
    if (this.textures.exists('dad_right')) {
      this.anims.create({
        key: 'dad_walk_prev',
        frames: this.anims.generateFrameNumbers('dad_right', { frames: [0, 1, 2, 1] }),
        frameRate: 2, repeat: -1,
      });
      this.add.sprite(W * 0.72, dadPosY, 'dad_right')
        .setScale(DAD_SCALE).setOrigin(0.5, 0.75).setDepth(3)
        .play('dad_walk_prev');
    }
    if (this.textures.exists('dad_down')) {
      this.anims.create({
        key: 'dad_walk_down_prev',
        frames: this.anims.generateFrameNumbers('dad_down', { frames: [0, 1, 2, 3] }),
        frameRate: 4, repeat: -1,
      });
      this.add.sprite(W * 0.88, dadPosY, 'dad_down')
        .setScale(DAD_SCALE).setOrigin(0.5, 0.75).setDepth(3)
        .play('dad_walk_down_prev');
    }

    // 足元基準線（赤）
    this.add.graphics().lineStyle(1, 0xff0000, 0.6).lineBetween(0, footY, W, footY);

    // ラベル
    [
      [W * 0.13, 'MOM 右向き'],
      [W * 0.33, 'MOM 左向き'],
      [W * 0.55, 'MOM 正面'],
      [W * 0.72, 'DAD 横'],
      [W * 0.88, 'DAD 正面'],
    ].forEach(([x, label]) => {
      const col = label.startsWith('DAD') ? '#ffcc00' : '#88ffcc';
      this.add.text(x, footY + 6, label, { fontSize: '10px', color: col }).setOrigin(0.5, 0);
    });
  }
}

const game = new Phaser.Game({
  type: Phaser.AUTO,
  width: 800,
  height: 360,
  backgroundColor: '#222',
  parent: 'game',
  scene: PreviewScene,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
});

// スライダーでMOMサイズをリアルタイム変更（シーン再起動）
</script>
</body>
</html>
