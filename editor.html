<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zombie Escort TD — マップエディタ</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; color:#ccc; font:13px/1.4 'Helvetica Neue',Arial,sans-serif; display:flex; height:100vh; overflow:hidden; }

    #sidebar {
      width:220px; min-width:220px; background:#1a1a2e; padding:12px; display:flex;
      flex-direction:column; gap:10px; overflow-y:auto; border-right:1px solid #334;
    }
    h1 { font-size:14px; color:#aaccff; border-bottom:1px solid #334; padding-bottom:6px; }
    h2 { font-size:12px; color:#778899; margin-top:4px; }

    .mode-group { display:flex; flex-direction:column; gap:4px; }
    .mode-btn {
      padding:6px 10px; border:1px solid #446; background:#1e2a3a; color:#9ab; cursor:pointer;
      border-radius:3px; font-size:12px; text-align:left;
    }
    .mode-btn.active { background:#2a4060; border-color:#5599ff; color:#aaddff; }
    .mode-btn:hover  { background:#253040; }

    .prop-type-btn {
      padding:5px 8px; border:1px solid #446; background:#1e2a3a; color:#9ab; cursor:pointer;
      border-radius:3px; font-size:11px; text-align:left;
    }
    .prop-type-btn.active { background:#2a4a2a; border-color:#55cc55; color:#aaffaa; }
    .prop-type-btn:hover  { background:#253040; }

    .sub-btn {
      padding:5px 8px; border:1px solid #446; background:#1e2a3a; color:#9ab; cursor:pointer;
      border-radius:3px; font-size:11px; flex:1;
    }
    .sub-btn.active { background:#2a4a2a; border-color:#55cc55; color:#aaffaa; }
    .sub-btn:hover  { background:#253040; }

    .sep { border-top:1px solid #334; margin:4px 0; }

    label { font-size:11px; color:#778; }
    input[type=number] {
      width:60px; background:#111; border:1px solid #446; color:#ccc;
      padding:2px 4px; border-radius:2px; font-size:12px;
    }
    .field-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

    #export-btn, #copy-btn, #clear-btn, #copy-props-btn, #copy-stage-btn, #copy-decals-btn {
      padding:7px 10px; border:none; cursor:pointer; border-radius:3px;
      font-size:12px; width:100%;
    }
    #export-btn       { background:#2a5080; color:#9cf; }
    #copy-btn         { background:#285038; color:#9c9; margin-top:4px; }
    #clear-btn        { background:#503030; color:#f99; margin-top:4px; }
    #copy-props-btn   { background:#2a4a30; color:#afa; margin-top:4px; }
    #copy-stage-btn   { background:#283050; color:#aac; margin-top:4px; }
    #copy-decals-btn  { background:#1a3a50; color:#9cf; margin-top:4px; }
    #export-btn:hover      { background:#3060a0; }
    #copy-btn:hover        { background:#306050; }
    #clear-btn:hover       { background:#703030; }
    #copy-props-btn:hover  { background:#356040; }
    #copy-stage-btn:hover  { background:#384060; }
    #copy-decals-btn:hover { background:#2a4a60; }

    textarea {
      width:100%; height:120px; background:#0d0d18; border:1px solid #446; color:#8c8;
      font:11px/1.3 monospace; padding:4px; resize:vertical; border-radius:2px; margin-top:4px;
    }

    #canvas-wrap { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:flex-start; padding:12px; }
    canvas { cursor:crosshair; border:1px solid #334; display:block; }

    #status            { font-size:11px; color:#667; margin-top:4px; min-height:14px; }
    #props-copy-status { font-size:11px; color:#6c6; display:block; min-height:14px; margin-top:2px; }
    #stage-copy-status { font-size:11px; color:#99c; display:block; min-height:14px; margin-top:2px; }
    .legend { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
    .leg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:#889; }
    .leg-swatch { width:12px; height:12px; border-radius:2px; }
  </style>
</head>
<body>
<div id="sidebar">
  <h1>マップエディタ</h1>

  <h2>グリッドサイズ</h2>
  <div class="field-row">
    <label>列</label><input type="number" id="cols" value="20" min="5" max="40">
    <label>行</label><input type="number" id="rows" value="15" min="5" max="30">
    <button class="mode-btn" onclick="resizeGrid()" style="width:auto;padding:4px 8px">適用</button>
  </div>

  <div class="sep"></div>
  <h2>地面ベース</h2>
  <div class="field-row" style="gap:4px">
    <button class="sub-btn active" id="ground-btn-grass"    onclick="selectGroundBase('grass')">🌿 grass</button>
    <button class="sub-btn"       id="ground-btn-dirt"     onclick="selectGroundBase('dirt')">🟫 dirt</button>
    <button class="sub-btn"       id="ground-btn-asphalt"  onclick="selectGroundBase('asphalt')">🔲 asph</button>
  </div>

  <div class="sep"></div>
  <h2>ツール</h2>
  <div class="mode-group">
    <button class="mode-btn active" id="btn-obstacle"   onclick="setMode('obstacle')">🧱 遮蔽物（クリック＝配置/削除）</button>
    <button class="mode-btn"        id="btn-buildspot"  onclick="setMode('buildspot')">🟡 設置点（クリック＝配置/削除）</button>
    <button class="mode-btn"        id="btn-start"      onclick="setMode('start')">🟢 護衛スタート</button>
    <button class="mode-btn"        id="btn-goal"       onclick="setMode('goal')">🏁 護衛ゴール</button>
    <button class="mode-btn"        id="btn-spawn"      onclick="setMode('spawn')">🔴 ゾンビスポーン（最大4）</button>
    <button class="mode-btn"        id="btn-prop"       onclick="setMode('prop')">🏠 プロップ配置</button>
    <button class="mode-btn"        id="btn-road"       onclick="setMode('road')">🛣 道路配置</button>
    <button class="mode-btn"        id="btn-paint"      onclick="setMode('paint')">🎨 地面ペイント</button>
    <button class="mode-btn"        id="btn-decal"      onclick="setMode('decal')">🟦 装飾(decal)配置</button>
  </div>

  <!-- 地面ペイントモード時のみ表示 -->
  <div id="paint-type-panel" style="display:none">
    <div class="sep"></div>
    <h2>ペイント色</h2>
    <div class="field-row" style="gap:4px">
      <button class="sub-btn"        id="paint-btn-grass"   onclick="selectPaintType('grass')">🌿 grass</button>
      <button class="sub-btn active" id="paint-btn-dirt"    onclick="selectPaintType('dirt')">🟫 dirt</button>
      <button class="sub-btn"        id="paint-btn-asphalt" onclick="selectPaintType('asphalt')">🔲 asph</button>
    </div>
    <div style="font-size:10px;color:#557;margin-top:4px">ドラッグで範囲を塗る<br>ベースと同色＝上書き削除</div>
  </div>

  <!-- 装飾配置モード時のみ表示 -->
  <div id="decal-type-panel" style="display:none">
    <div class="sep"></div>
    <h2>デカール種別</h2>
    <div id="decal-type-btns" class="mode-group"></div>
    <button id="copy-decals-btn" onclick="copyDecalsJSON()">📋 decals JSON をコピー</button>
    <span id="decals-copy-status" style="font-size:11px;color:#9cf;display:block;min-height:14px;margin-top:2px"></span>
  </div>

  <!-- プロップ配置モード時のみ表示 -->
  <div id="prop-type-panel" style="display:none">
    <div class="sep"></div>
    <h2>プロップ種別</h2>
    <div id="prop-type-btns" class="mode-group"></div>
    <button id="copy-props-btn" onclick="copyPropsJSON()">📋 props JSON をコピー</button>
    <span id="props-copy-status"></span>
  </div>

  <!-- 道路配置モード時のみ表示 -->
  <div id="road-axis-panel" style="display:none">
    <div class="sep"></div>
    <h2>道路の向き</h2>
    <div class="field-row" style="gap:4px">
      <button class="sub-btn active" id="road-axis-h" onclick="selectRoadAxis('h')">↔ 横道(h)</button>
      <button class="sub-btn"        id="road-axis-v" onclick="selectRoadAxis('v')">↕ 縦道(v)</button>
    </div>
    <div style="font-size:10px;color:#557;margin-top:4px">クリック＝配置／再クリック＝削除</div>
  </div>

  <div class="sep"></div>
  <h2>護衛パラメータ</h2>
  <div class="field-row">
    <label>HP</label><input type="number" id="esc-hp" value="100" min="10" max="999">
    <label>速度</label><input type="number" id="esc-speed" value="80" min="20" max="300">
  </div>

  <h2>所持金</h2>
  <div class="field-row">
    <label>初期金</label><input type="number" id="start-money" value="500" min="0" max="9999">
  </div>

  <div class="sep"></div>
  <h2>凡例</h2>
  <div class="legend">
    <div class="leg-item"><div class="leg-swatch" style="background:#445566"></div>遮蔽物</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#ffee44;opacity:0.6"></div>設置点</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#00ff88;opacity:0.5"></div>スタート</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#ffff00;opacity:0.5"></div>ゴール</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#ff3300;opacity:0.6"></div>スポーン</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#ff9944;opacity:0.7"></div>プロップ</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#888888"></div>道路</div>
  </div>

  <div class="sep"></div>
  <h2>ウェーブ設定（エクスポート時に適用）</h2>
  <div style="font-size:11px;color:#667;margin-bottom:4px">Wave 1 の敵種別</div>
  <select id="w1-type" style="width:100%;background:#111;border:1px solid #446;color:#ccc;padding:3px;margin-bottom:4px">
    <option value="normal">normal（通常）</option>
    <option value="normal_cap">normal_cap（帽子）</option>
    <option value="normal_helmet">normal_helmet（ヘルメット）</option>
    <option value="alt">alt（別体型）</option>
    <option value="alt_cap">alt_cap（別体型・帽子）</option>
    <option value="alt_helmet">alt_helmet（別体型・ヘルメット）</option>
  </select>
  <div style="font-size:11px;color:#667;margin-bottom:4px">Wave 2 の敵種別</div>
  <select id="w2-type" style="width:100%;background:#111;border:1px solid #446;color:#ccc;padding:3px;margin-bottom:4px">
    <option value="normal_cap" selected>normal_cap</option>
    <option value="normal">normal</option>
    <option value="normal_helmet">normal_helmet</option>
    <option value="alt">alt</option>
    <option value="alt_cap">alt_cap</option>
    <option value="alt_helmet">alt_helmet</option>
  </select>
  <div style="font-size:11px;color:#667;margin-bottom:4px">Wave 3 の敵種別</div>
  <select id="w3-type" style="width:100%;background:#111;border:1px solid #446;color:#ccc;padding:3px;margin-bottom:8px">
    <option value="normal_helmet" selected>normal_helmet</option>
    <option value="normal">normal</option>
    <option value="normal_cap">normal_cap</option>
    <option value="alt">alt</option>
    <option value="alt_cap">alt_cap</option>
    <option value="alt_helmet">alt_helmet</option>
  </select>

  <div class="sep"></div>
  <button id="export-btn"     onclick="exportJSON()">▼ JSON 生成</button>
  <button id="copy-btn"       onclick="copyJSON()">📋 クリップボードにコピー</button>
  <button id="copy-stage-btn" onclick="copyStageJSON()">🗺 ステージ設定 JSON をコピー</button>
  <span id="stage-copy-status"></span>
  <button id="clear-btn"      onclick="clearAll()">🗑 全消去</button>
  <textarea id="json-out" readonly placeholder="ここにJSONが表示されます"></textarea>
  <div id="status"></div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<script>
const CELL = 40;  // エディタ内の表示セルサイズ
let COLS = 20, ROWS = 15;

let obstacles  = new Set();  // "col,row"
let buildSpots = new Set();  // "col,row"
let startCell  = { col: 0,  row: Math.floor(ROWS/2) };
let goalCell   = { col: COLS-1, row: Math.floor(ROWS/2) };
let spawns     = [{ col:0, row:0 }, { col:COLS-1, row:0 }, { col:0, row:ROWS-1 }, { col:COLS-1, row:ROWS-1 }];
let mode = 'obstacle';
let isDragging = false;
let dragAction = null; // 'add' | 'remove'

// ─── 地面・道路 ──────────────────────────────────────────────
let groundBase = 'grass';
let hRoads = new Set(); // 横道：行番号（row）の Set
let vRoads = new Set(); // 縦道：列番号（col）の Set
let roadAxis = 'h';     // 現在の道路向き

let cellGrounds    = new Map(); // "col,row" → groundType（セル別地面上書き）
let paintType      = 'dirt';
let paintDragStart = null, paintDragEnd = null;

const GROUND_COLORS = {
  grass:   '#2d6b2a',
  dirt:    '#7a5a2a',
  asphalt: '#3a3a3a',
};
function groundColor() { return GROUND_COLORS[groundBase] ?? '#1a1a2e'; }

function selectGroundBase(type) {
  groundBase = type;
  document.querySelectorAll('[id^="ground-btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`ground-btn-${type}`)?.classList.add('active');
  redraw();
}

function selectRoadAxis(axis) {
  roadAxis = axis;
  document.getElementById('road-axis-h').classList.toggle('active', axis === 'h');
  document.getElementById('road-axis-v').classList.toggle('active', axis === 'v');
}

function selectPaintType(type) {
  paintType = type;
  document.querySelectorAll('[id^="paint-btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`paint-btn-${type}`)?.classList.add('active');
}

// ─── デカール ─────────────────────────────────────────────────
// config.js の DECAL_DEFS と手動同期すること（当たり判定なし）
const DECAL_DEFS = {
  crosswalk_h: { cols: 2, rows: 1 },
  crosswalk_v: { cols: 1, rows: 2 },
  manhole:     { cols: 1, rows: 1 },
};
const DECAL_COLORS = {
  crosswalk_h: '#ddcc22',
  crosswalk_v: '#ddcc22',
  manhole:     '#aaaaaa',
};
function decalColor(type) { return DECAL_COLORS[type] || '#88ccff'; }

let decals = [];
let selectedDecalType = Object.keys(DECAL_DEFS)[0];

const decalImages = {};
for (const type of Object.keys(DECAL_DEFS)) {
  const img = new Image();
  img.onload = () => { decalImages[type] = img; redraw(); };
  img.src = `assets/sprites/decal/${type}.png`;
}

// ─── プロップ ───────────────────────────────────────────────
// config.js の PROP_DEFS と同期を保つこと
const PROP_DEFS = {
  shop:        { cols: 4, rows: 4 },
  shop_front:  { cols: 3, rows: 3 },
  shop_back:   { cols: 3, rows: 3 },
  house_front: { cols: 3, rows: 3 },
  house_back:  { cols: 3, rows: 3 },
  guardrail_h: { cols: 1, rows: 1 },
  guardrail_v: { cols: 1, rows: 1 },
  tree:        { cols: 1, rows: 1 },
  house:       { cols: 3, rows: 3 },
  hospital:    { cols: 4, rows: 3 },
  police:      { cols: 3, rows: 3 },
};

const PROP_COLORS = {
  shop:     '#ff9944',
  house:    '#44aaff',
  hospital: '#ff4488',
  police:   '#6688ff',
};
function propColor(type) { return PROP_COLORS[type] || '#aaaaaa'; }

let props        = [];
let propOccupied = new Set();
let hoverCell    = null;
let selectedPropType = Object.keys(PROP_DEFS)[0];

const propImages = {};
for (const type of Object.keys(PROP_DEFS)) {
  const img = new Image();
  img.onload = () => { propImages[type] = img; redraw(); };
  img.src = `assets/sprites/prop/${type}.png`;
}

function buildPropTypeButtons() {
  const container = document.getElementById('prop-type-btns');
  container.innerHTML = '';
  for (const type of Object.keys(PROP_DEFS)) {
    const btn = document.createElement('button');
    btn.className = 'prop-type-btn' + (type === selectedPropType ? ' active' : '');
    btn.id = `prop-type-${type}`;
    btn.textContent = `${type}  (${PROP_DEFS[type].cols}×${PROP_DEFS[type].rows})`;
    btn.onclick = () => selectPropType(type);
    container.appendChild(btn);
  }
}

function selectPropType(type) {
  selectedPropType = type;
  // ID prefix でフィルタして decal ボタンに干渉しない
  document.querySelectorAll('.prop-type-btn[id^="prop-type-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`prop-type-${type}`)?.classList.add('active');
}

function buildDecalTypeButtons() {
  const container = document.getElementById('decal-type-btns');
  container.innerHTML = '';
  for (const type of Object.keys(DECAL_DEFS)) {
    const btn = document.createElement('button');
    btn.className = 'prop-type-btn' + (type === selectedDecalType ? ' active' : '');
    btn.id = `decal-type-${type}`;
    btn.textContent = `${type}  (${DECAL_DEFS[type].cols}×${DECAL_DEFS[type].rows})`;
    btn.onclick = () => selectDecalType(type);
    container.appendChild(btn);
  }
}

function selectDecalType(type) {
  selectedDecalType = type;
  document.querySelectorAll('.prop-type-btn[id^="decal-type-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`decal-type-${type}`)?.classList.add('active');
}

function findDecalAt(col, row, type) {
  return decals.findIndex(d => {
    if (d.type !== type) return false;
    const def = DECAL_DEFS[d.type];
    return col >= d.col && col < d.col + def.cols &&
           row >= d.row && row < d.row + def.rows;
  });
}

// ─── 汎用 ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resizeGrid() {
  COLS = parseInt(document.getElementById('cols').value, 10);
  ROWS = parseInt(document.getElementById('rows').value, 10);
  startCell = { col: 0,      row: Math.floor(ROWS/2) };
  goalCell  = { col: COLS-1, row: Math.floor(ROWS/2) };
  spawns    = [{ col:0, row:0 }, { col:COLS-1, row:0 }, { col:0, row:ROWS-1 }, { col:COLS-1, row:ROWS-1 }];
  obstacles.clear();
  buildSpots.clear();
  redraw();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${m}`)?.classList.add('active');
  document.getElementById('prop-type-panel').style.display   = (m === 'prop')  ? 'block' : 'none';
  document.getElementById('road-axis-panel').style.display   = (m === 'road')  ? 'block' : 'none';
  document.getElementById('paint-type-panel').style.display  = (m === 'paint') ? 'block' : 'none';
  document.getElementById('decal-type-panel').style.display  = (m === 'decal') ? 'block' : 'none';
  hoverCell = null;
  redraw();
}

function cellKey(c, r) { return `${c},${r}`; }

function findPropAt(col, row) {
  return props.findIndex(p => {
    const def = PROP_DEFS[p.type];
    return col >= p.col && col < p.col + def.cols &&
           row >= p.row && row < p.row + def.rows;
  });
}

function canPlaceProp(col, row, type) {
  const def = PROP_DEFS[type];
  for (let dc = 0; dc < def.cols; dc++) {
    for (let dr = 0; dr < def.rows; dr++) {
      if (col + dc >= COLS || row + dr >= ROWS) return false;
      if (col + dc < 0   || row + dr < 0)       return false;
      if (propOccupied.has(cellKey(col + dc, row + dr))) return false;
    }
  }
  return true;
}

function handleCell(col, row, isDown) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  if (mode === 'obstacle') {
    const k = cellKey(col, row);
    if (isDown) dragAction = obstacles.has(k) ? 'remove' : 'add';
    if (dragAction === 'add')    obstacles.add(k);
    if (dragAction === 'remove') obstacles.delete(k);

  } else if (mode === 'buildspot') {
    const k = cellKey(col, row);
    if (isDown) dragAction = buildSpots.has(k) ? 'remove' : 'add';
    if (dragAction === 'add')    buildSpots.add(k);
    if (dragAction === 'remove') buildSpots.delete(k);

  } else if (mode === 'start') {
    startCell = { col, row };

  } else if (mode === 'goal') {
    goalCell = { col, row };

  } else if (mode === 'spawn') {
    const k   = cellKey(col, row);
    const idx = spawns.findIndex(s => s.col === col && s.row === row);
    if (idx >= 0) {
      spawns.splice(idx, 1);
    } else if (spawns.length < 4) {
      spawns.push({ col, row });
    } else {
      document.getElementById('status').textContent = 'スポーンは最大4つまで';
    }

  } else if (mode === 'prop' && isDown) {
    const existingIdx = findPropAt(col, row);
    if (existingIdx >= 0) {
      const p   = props[existingIdx];
      const def = PROP_DEFS[p.type];
      for (let dc = 0; dc < def.cols; dc++)
        for (let dr = 0; dr < def.rows; dr++)
          propOccupied.delete(cellKey(p.col + dc, p.row + dr));
      props.splice(existingIdx, 1);
    } else {
      if (!canPlaceProp(col, row, selectedPropType)) return;
      props.push({ type: selectedPropType, col, row });
      const def = PROP_DEFS[selectedPropType];
      for (let dc = 0; dc < def.cols; dc++)
        for (let dr = 0; dr < def.rows; dr++)
          propOccupied.add(cellKey(col + dc, row + dr));
    }

  } else if (mode === 'road' && isDown) {
    if (roadAxis === 'h') {
      if (hRoads.has(row)) hRoads.delete(row);
      else hRoads.add(row);
    } else {
      if (vRoads.has(col)) vRoads.delete(col);
      else vRoads.add(col);
    }

  } else if (mode === 'decal' && isDown) {
    const def = DECAL_DEFS[selectedDecalType];
    if (!def) return;
    const idx = findDecalAt(col, row, selectedDecalType);
    if (idx >= 0) {
      decals.splice(idx, 1);  // トグル削除
    } else if (col + def.cols <= COLS && row + def.rows <= ROWS) {
      decals.push({ type: selectedDecalType, col, row });
    }
  }

  redraw();
}

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  const [col, row] = screenToCell(e);
  if (mode === 'paint') {
    paintDragStart = { col, row };
    paintDragEnd   = { col, row };
    redraw();
  } else {
    handleCell(col, row, true);
  }
});
canvas.addEventListener('mousemove', e => {
  const [col, row] = screenToCell(e);
  hoverCell = { col, row };
  if (isDragging && mode === 'paint') {
    paintDragEnd = { col, row };
    redraw();
  } else if (isDragging && mode !== 'prop' && mode !== 'road') {
    handleCell(col, row, false);
  } else {
    redraw();
  }
});
canvas.addEventListener('mouseup', () => {
  if (mode === 'paint' && paintDragStart) applyPaint();
  isDragging = false; dragAction = null;
  paintDragStart = null; paintDragEnd = null;
});
canvas.addEventListener('mouseleave', () => {
  if (mode === 'paint' && isDragging && paintDragStart) applyPaint();
  isDragging = false; dragAction = null;
  paintDragStart = null; paintDragEnd = null;
  hoverCell = null; redraw();
});

function screenToCell(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  return [Math.floor(x / CELL), Math.floor(y / CELL)];
}

function applyPaint() {
  if (!paintDragStart || !paintDragEnd) return;
  const minCol = Math.min(paintDragStart.col, paintDragEnd.col);
  const maxCol = Math.max(paintDragStart.col, paintDragEnd.col);
  const minRow = Math.min(paintDragStart.row, paintDragEnd.row);
  const maxRow = Math.max(paintDragStart.row, paintDragEnd.row);
  for (let col = minCol; col <= maxCol; col++) {
    for (let row = minRow; row <= maxRow; row++) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) continue;
      const k = cellKey(col, row);
      if (paintType === groundBase) {
        cellGrounds.delete(k);  // ベースと同色はセル上書きを削除
      } else {
        cellGrounds.set(k, paintType);
      }
    }
  }
  redraw();
}

// ─── 道路描画 ─────────────────────────────────────────────────
function drawRoads() {
  // 道路帯（グレー）
  ctx.fillStyle = '#888888';
  for (const row of hRoads) {
    ctx.fillRect(0, row * CELL, canvas.width, CELL);
  }
  for (const col of vRoads) {
    ctx.fillRect(col * CELL, 0, CELL, canvas.height);
  }

  // 白破線（中点アンカー方式：GameScene と同じアルゴリズム）
  const DASH  = Math.round(28 * CELL / 64);
  const GAP   = Math.round(24 * CELL / 64);
  const THICK = Math.max(2, Math.round(6 * CELL / 64));
  const cycle = DASH + GAP;

  const drawSegment = (axis, fixedPos, startPx, endPx) => {
    if (endPx <= startPx) return;
    const mid           = (startPx + endPx) / 2;
    const virtDashStart = mid - DASH / 2;
    const n             = Math.floor((startPx - virtDashStart) / cycle);
    let   pos           = virtDashStart + n * cycle;
    ctx.strokeStyle = 'rgba(235,235,225,0.85)';
    ctx.lineWidth   = THICK;
    ctx.setLineDash([]);
    while (pos < endPx) {
      const ds = Math.max(pos, startPx);
      const de = Math.min(pos + DASH, endPx);
      if (ds < de) {
        ctx.beginPath();
        if (axis === 'h') { ctx.moveTo(ds, fixedPos); ctx.lineTo(de, fixedPos); }
        else               { ctx.moveTo(fixedPos, ds); ctx.lineTo(fixedPos, de); }
        ctx.stroke();
      }
      pos += cycle;
    }
  };

  const sortedVCols = [...vRoads].sort((a, b) => a - b);
  const sortedHRows = [...hRoads].sort((a, b) => a - b);

  for (const row of hRoads) {
    const y = row * CELL + CELL / 2;
    let segFrom = 0;
    for (const inter of [...sortedVCols, null]) {
      const segTo = inter !== null ? inter - 1 : COLS - 1;
      if (segFrom <= segTo) drawSegment('h', y, segFrom * CELL, (segTo + 1) * CELL);
      if (inter !== null) segFrom = inter + 1;
    }
  }

  for (const col of vRoads) {
    const x = col * CELL + CELL / 2;
    let segFrom = 0;
    for (const inter of [...sortedHRows, null]) {
      const segTo = inter !== null ? inter - 1 : ROWS - 1;
      if (segFrom <= segTo) drawSegment('v', x, segFrom * CELL, (segTo + 1) * CELL);
      if (inter !== null) segFrom = inter + 1;
    }
  }

  // 道路モード：ホバーハイライト
  if (mode === 'road' && hoverCell) {
    ctx.fillStyle = 'rgba(200,200,200,0.25)';
    if (roadAxis === 'h') {
      ctx.fillRect(0, hoverCell.row * CELL, canvas.width, CELL);
    } else {
      ctx.fillRect(hoverCell.col * CELL, 0, CELL, canvas.height);
    }
  }
}

// ─── 描画 ───────────────────────────────────────────────────
function redraw() {
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  // 地面ベース
  ctx.fillStyle = groundColor();
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // セル別地面上書き
  for (const [key, type] of cellGrounds) {
    const [c, r] = key.split(',').map(Number);
    ctx.fillStyle = GROUND_COLORS[type] ?? '#1a1a2e';
    ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
  }

  // 道路（地面の上、その他の要素の下）
  drawRoads();

  // デカール（道路の上・obstacles の下）
  for (const d of decals) drawDecal(d);

  // スタート・ゴール
  ctx.fillStyle = 'rgba(0,255,136,0.25)';
  ctx.fillRect(startCell.col * CELL, startCell.row * CELL, CELL, CELL);
  ctx.fillStyle = 'rgba(255,255,0,0.25)';
  ctx.fillRect(goalCell.col * CELL, goalCell.row * CELL, CELL, CELL);

  // スポーン
  for (const sp of spawns) {
    ctx.strokeStyle = 'rgba(255,51,0,0.7)';
    ctx.lineWidth = 2;
    ctx.strokeRect(sp.col * CELL + 2, sp.row * CELL + 2, CELL - 4, CELL - 4);
  }

  // 遮蔽物
  for (const k of obstacles) {
    const [c, r] = k.split(',').map(Number);
    ctx.fillStyle = '#445566';
    ctx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);
  }

  // 設置点
  for (const k of buildSpots) {
    const [c, r] = k.split(',').map(Number);
    ctx.fillStyle = 'rgba(255,238,68,0.18)';
    ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    ctx.strokeStyle = 'rgba(255,238,68,0.7)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(c * CELL + 4, r * CELL + 4, CELL - 8, CELL - 8);
    ctx.fillStyle = '#ffee44';
    ctx.beginPath();
    ctx.arc(c * CELL + CELL / 2, r * CELL + CELL / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // プロップ描画
  for (const p of props) {
    drawProp(p, 1.0);
  }

  // プロップモード：ホバープレビュー
  if (mode === 'prop' && hoverCell) {
    const { col, row } = hoverCell;
    const def = PROP_DEFS[selectedPropType];
    const canPlace = canPlaceProp(col, row, selectedPropType) && findPropAt(col, row) < 0;
    const pw = def.cols * CELL, ph = def.rows * CELL;
    const px = col * CELL,      py = row * CELL;
    if (canPlace) {
      ctx.fillStyle = 'rgba(100,220,180,0.25)'; ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = 'rgba(100,220,180,0.9)';
    } else {
      ctx.fillStyle = 'rgba(255,60,60,0.25)'; ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = 'rgba(255,80,80,0.9)';
    }
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
  }

  // デカールモード：ホバープレビュー
  if (mode === 'decal' && hoverCell) {
    const { col, row } = hoverCell;
    const def = DECAL_DEFS[selectedDecalType];
    if (def) {
      const inBounds = col >= 0 && row >= 0 && col + def.cols <= COLS && row + def.rows <= ROWS;
      const pw = def.cols * CELL, ph = def.rows * CELL;
      ctx.fillStyle = inBounds ? 'rgba(100,200,255,0.2)' : 'rgba(255,80,80,0.15)';
      ctx.fillRect(col * CELL, row * CELL, pw, ph);
      ctx.strokeStyle = inBounds ? 'rgba(100,200,255,0.8)' : 'rgba(255,80,80,0.7)';
      ctx.lineWidth = 2;
      ctx.strokeRect(col * CELL + 1, row * CELL + 1, pw - 2, ph - 2);
    }
  }

  // ペイントモード：ドラッグ矩形プレビュー
  if (mode === 'paint' && paintDragStart && paintDragEnd) {
    const minCol = Math.min(paintDragStart.col, paintDragEnd.col);
    const maxCol = Math.max(paintDragStart.col, paintDragEnd.col);
    const minRow = Math.min(paintDragStart.row, paintDragEnd.row);
    const maxRow = Math.max(paintDragStart.row, paintDragEnd.row);
    const px = minCol * CELL, py = minRow * CELL;
    const pw = (maxCol - minCol + 1) * CELL, ph = (maxRow - minRow + 1) * CELL;
    ctx.fillStyle = 'rgba(220,200,120,0.28)';
    ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = 'rgba(230,210,130,0.95)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
    ctx.setLineDash([]);
  }

  // グリッド線
  ctx.strokeStyle = 'rgba(60,60,80,0.6)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
  }

  // ラベル
  ctx.fillStyle = '#00ff88'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('S', startCell.col * CELL + CELL/2, startCell.row * CELL + CELL/2 + 4);
  ctx.fillStyle = '#ffff44';
  ctx.fillText('G', goalCell.col * CELL + CELL/2, goalCell.row * CELL + CELL/2 + 4);
  ctx.fillStyle = '#ff6633';
  for (let i = 0; i < spawns.length; i++) {
    ctx.fillText(i + 1, spawns[i].col * CELL + CELL/2, spawns[i].row * CELL + CELL/2 + 4);
  }
}

function drawProp(p, alpha) {
  const def = PROP_DEFS[p.type];
  if (!def) return;
  const px = p.col * CELL, py = p.row * CELL;
  const pw = def.cols * CELL, ph = def.rows * CELL;
  ctx.save();
  ctx.globalAlpha = alpha;
  if (propImages[p.type]) {
    ctx.drawImage(propImages[p.type], px, py, pw, ph);
  } else {
    const col = propColor(p.type);
    ctx.fillStyle = col + '55';
    ctx.fillRect(px + 2, py + 2, pw - 4, ph - 4);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 2, py + 2, pw - 4, ph - 4);
    ctx.fillStyle = col;
    ctx.font = `bold ${Math.min(14, pw / p.type.length * 1.4)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.type, px + pw / 2, py + ph / 2 + 4);
  }
  ctx.restore();
}

function drawDecal(d) {
  const def = DECAL_DEFS[d.type];
  if (!def) return;
  const px = d.col * CELL, py = d.row * CELL;
  const pw = def.cols * CELL, ph = def.rows * CELL;
  ctx.save();
  ctx.globalAlpha = 0.85;
  if (decalImages[d.type]) {
    ctx.drawImage(decalImages[d.type], px, py, pw, ph);
  } else {
    const col = decalColor(d.type);
    ctx.fillStyle = col + '55';
    ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
    ctx.fillStyle = col;
    ctx.font = `bold ${Math.min(11, pw / d.type.length * 1.4)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(d.type, px + pw / 2, py + ph / 2 + 4);
  }
  ctx.restore();
}

// ─── decals JSON コピー ──────────────────────────────────────
function copyDecalsJSON() {
  const arr  = decals.map(d => ({ type: d.type, col: d.col, row: d.row }));
  const text = '"decals": ' + JSON.stringify(arr, null, 2);
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('decals-copy-status');
    el.textContent = 'コピーしました！';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }).catch(() => {
    document.getElementById('decals-copy-status').textContent = 'コピー失敗';
  });
}

// ─── JSON エクスポート（既存） ───────────────────────────────
function buildJSON() {
  const obsArr = [];
  for (const k of obstacles) {
    const [col, row] = k.split(',').map(Number);
    obsArr.push({ col, row });
  }
  obsArr.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);

  const bsArr = [];
  for (const k of buildSpots) {
    const [col, row] = k.split(',').map(Number);
    bsArr.push({ col, row });
  }
  bsArr.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);

  return {
    id:   'stage_custom',
    name: 'カスタムステージ',
    grid: { cols: COLS, rows: ROWS },
    startMoney: parseInt(document.getElementById('start-money').value, 10) || 500,
    escort: {
      start: { ...startCell },
      goal:  { ...goalCell },
      hp:    parseInt(document.getElementById('esc-hp').value, 10)    || 100,
      speed: parseInt(document.getElementById('esc-speed').value, 10) || 80,
    },
    obstacles:    obsArr,
    zombieSpawns: spawns.map(s => ({ ...s })),
    buildSpots:   bsArr,
    waves: [
      { startDelay:6000, spawnInterval:2500, count:4,  enemy:{ type: document.getElementById('w1-type').value, hp:30, speed:55, damage:10, reward:20 } },
      { startDelay:4000, spawnInterval:2000, count:7,  enemy:{ type: document.getElementById('w2-type').value, hp:45, speed:62, damage:13, reward:25 } },
      { startDelay:4000, spawnInterval:1500, count:12, enemy:{ type: document.getElementById('w3-type').value, hp:60, speed:70, damage:18, reward:30 } },
    ]
  };
}

function exportJSON() {
  document.getElementById('json-out').value = JSON.stringify(buildJSON(), null, 2);
  document.getElementById('status').textContent = '✓ JSON生成完了';
}

function copyJSON() {
  const j = JSON.stringify(buildJSON(), null, 2);
  document.getElementById('json-out').value = j;
  navigator.clipboard.writeText(j).then(() => {
    document.getElementById('status').textContent = '✓ クリップボードにコピーしました';
  }).catch(() => {
    document.getElementById('status').textContent = 'コピー失敗（手動でコピーしてください）';
  });
}

// ─── props JSON のみコピー ───────────────────────────────────
function copyPropsJSON() {
  const arr  = props.map(p => ({ type: p.type, col: p.col, row: p.row }));
  const text = '"props": ' + JSON.stringify(arr, null, 2);
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('props-copy-status');
    el.textContent = 'コピーしました！';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }).catch(() => {
    document.getElementById('props-copy-status').textContent = 'コピー失敗';
  });
}

// ─── ステージ設定 JSON（ground_base + roads）コピー ──────────
function copyStageJSON() {
  const roadsArr = [];
  for (const row of [...hRoads].sort((a, b) => a - b)) {
    roadsArr.push({ axis: 'h', line: row, from: 0, to: COLS - 1 });
  }
  for (const col of [...vRoads].sort((a, b) => a - b)) {
    roadsArr.push({ axis: 'v', line: col, from: 0, to: ROWS - 1 });
  }
  const cellGroundsArr = [];
  for (const [key, type] of cellGrounds) {
    const [col, row] = key.split(',').map(Number);
    cellGroundsArr.push({ col, row, type });
  }
  cellGroundsArr.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);

  let text = `"ground_base": "${groundBase}",\n"roads": ${JSON.stringify(roadsArr, null, 2)}`;
  if (cellGroundsArr.length > 0) {
    text += `,\n"ground_cells": ${JSON.stringify(cellGroundsArr, null, 2)}`;
  }
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('stage-copy-status');
    el.textContent = 'コピーしました！';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }).catch(() => {
    document.getElementById('stage-copy-status').textContent = 'コピー失敗';
  });
}

function clearAll() {
  if (!confirm('全消去しますか？')) return;
  obstacles.clear();
  buildSpots.clear();
  props = [];
  propOccupied.clear();
  hRoads.clear();
  vRoads.clear();
  cellGrounds.clear();
  decals = [];
  spawns = [{ col:0, row:0 }, { col:COLS-1, row:0 }, { col:0, row:ROWS-1 }, { col:COLS-1, row:ROWS-1 }];
  selectGroundBase('grass');
  redraw();
}

// ─── 起動時：stage_01.json の ground_base / roads を読み込む ─
fetch('stages/stage_01.json')
  .then(r => r.json())
  .then(data => {
    if (data.ground_base) selectGroundBase(data.ground_base);
    if (Array.isArray(data.roads)) {
      for (const road of data.roads) {
        if (road.axis === 'h') hRoads.add(road.line);
        else if (road.axis === 'v') vRoads.add(road.line);
      }
    }
    if (Array.isArray(data.ground_cells)) {
      for (const cell of data.ground_cells) {
        cellGrounds.set(`${cell.col},${cell.row}`, cell.type);
      }
    }
    if (Array.isArray(data.decals)) {
      for (const d of data.decals) {
        decals.push({ type: d.type, col: d.col, row: d.row });
      }
    }
    redraw();
  })
  .catch(() => {});

// 初期化
buildPropTypeButtons();
buildDecalTypeButtons();
redraw();
</script>
