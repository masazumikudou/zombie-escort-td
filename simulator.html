<!--
  ⚠️ E-17: シミュレーターは実機よりタワーが強く出る傾向がある。
  このツールは「絶対無理な配置を切るフィルター」として使うこと。
  最終確認は必ず実機で行うこと。
-->

<!-- エンジンモジュール（draw()は呼ばない。Phaser不要） -->
<script src="js/config.js"></script>
<script src="js/pathfinder.js"></script>
<script src="js/FlowField.js"></script>
<script src="js/SpawnEventManager.js"></script>
<script src="js/Escort.js"></script>
<script src="js/Zombie.js"></script>
<script src="js/simStub.js"></script>

<script>
/* ============================================================
   ZOMBIE ESCORT TD — ステージシミュレーター
   ⚠️ E-17: タワーは実機より強く出る傾向あり（弾着弾タイミング差）。
            このツールは「絶対無理な配置を切るフィルター」として使うこと。
            最終確認は必ず実機で行うこと。
   ============================================================ */

// Phaser/audio スタブ（draw() を呼ばない前提）
const audioSynth = { hit() {}, escortHit() {} };

// ─── SimTower ──────────────────────────────────────────────────────────
class SimTower {
  constructor(col, row, type, logArr = null) {
    const cc      = cellCenter(col, row);
    this.x        = cc.x;
    this.y        = cc.y;
    const d       = TOWER_DEFS[type] ?? TOWER_DEFS.normal;
    this.range    = d.range * CELL;
    this.fireRate = d.fireRate;
    this.damage   = d.damage;
    this.lastFire = -99999;
    this._bullets = [];  // { arrivesAt, target }
    this._logArr  = logArr;
    this._type         = type;
    this._col          = col;
    this._row          = row;
    this._label        = `${type}@(${col},${row})`;
    this.upgradeLevel  = 1;
    this._baseDamage   = d.damage;
    this._baseFireRate = d.fireRate;
  }

  _log(msg) { if (this._logArr) this._logArr.push(msg); }

  _applyUpgradeStats() {
    const ups = UPGRADE_DEFS?.perType?.[this._type];
    if (!ups) return;
    const n = this.upgradeLevel - 1;
    if (ups.dmgMult)      this.damage   = Math.round(this._baseDamage   * Math.pow(ups.dmgMult, n));
    if (ups.fireRateMult) this.fireRate = Math.round(this._baseFireRate  / Math.pow(ups.fireRateMult, n));
  }

  upgrade() {
    const maxLv = UPGRADE_DEFS?.maxLevel ?? 3;
    if (this.upgradeLevel >= maxLv) return false;
    this.upgradeLevel++;
    this._applyUpgradeStats();
    return true;
  }

  update(scaledTime, zombies, escort) {
    // 着弾処理（HITはZombie.takeDamage._log経由でlogArrに記録される）
    this._bullets = this._bullets.filter(b => {
      if (scaledTime < b.arrivesAt) return true;
      if (b.target.alive) b.target.takeDamage(this.damage);
      return false;
    });

    if (scaledTime - this.lastFire < this.fireRate) return;

    // 射程内で護衛に最も近いゾンビを狙う（仕様通り）
    let best = null, bestDist = Infinity;
    for (const z of zombies) {
      if (!z.alive) continue;
      const tdx = z.x - this.x, tdy = z.y - this.y;
      if (Math.sqrt(tdx*tdx + tdy*tdy) > this.range) continue;
      const ref = escort ?? { x: this.x, y: this.y };
      const edx = z.x - ref.x, edy = z.y - ref.y;
      const d   = Math.sqrt(edx*edx + edy*edy);
      // 護衛範囲円（交戦ゲート）: 円の外のゾンビはタワーの射程内でも対象外
      if (escort && d > ESCORT_ENGAGE_RADIUS) continue;
      if (d < bestDist) { bestDist = d; best = z; }
    }
    if (!best) return;

    // 弾丸発射（speed=500px/s ホーミング近似、発射時の距離で飛行時間計算）
    const fdx  = best.x - this.x, fdy = best.y - this.y;
    const dist = Math.sqrt(fdx*fdx + fdy*fdy);
    const arrivesAt = scaledTime + (dist / 500) * 1000;
    this._bullets.push({ arrivesAt, target: best });
    this.lastFire = scaledTime;
    this._log(`[FIRE] t=${Math.round(scaledTime)}ms tower=${this._label} → id=${best._logId} dist=${Math.round(dist)} eta=${Math.round(arrivesAt)}ms`);
  }
}

// ─── タワー配置テキスト解析 ───────────────────────────────────────────────
// 形式: "normal:5,3 sniper:8,3"    即時建設
//       "sniper:7,14@90000"         t=90000ms に建設（道中資金で）
//       "upgrade:5,3@60000"         t=60000ms に (5,3) のタワーを強化
function parseTowerPattern(text) {
  return text.trim().split(/[\s\n]+/).flatMap(token => {
    const m = token.match(/^(\w+):(\d+),(\d+)(?:@(\d+))?$/);
    return m ? [{ type: m[1], col: +m[2], row: +m[3], buildAt: m[4] !== undefined ? +m[4] : 0 }] : [];
  });
}

// ─── StageSimulator ───────────────────────────────────────────────────────
// ⚠️ E-17: タワーが実機より強く出る（瞬間着弾ではなく弾速500px/sを反映しているが
//          FlowFieldのBFS精度差・フレームレート差により実機と完全一致しない）
class StageSimulator {
  run(stage, towerPlacements, opts = {}) {
    Zombie._seq = 0;  // 連続run()でのIDリセット（run_sim.jsと同様）
    const log = [];
    let scaledTime = 0;

    // グリッド設定（config.js の let 変数を上書き）
    COLS  = stage.grid.cols;
    ROWS  = stage.grid.rows;
    MAP_W = CELL * COLS;
    MAP_H = CELL * ROWS;

    const pf = new Pathfinder(COLS, ROWS, stage.obstacles ?? []);
    const ff = new FlowField(pf);

    // モックScene（draw() 呼び出しなし前提。add/textures/animsはjs/simStub.jsでrun_sim.jsと共通化）
    const mockScene = { flowField: ff, _playLog: log, scaledTime: 0,
                         add: createMockSceneAdd(), textures: MOCK_TEXTURES, anims: MOCK_ANIMS };

    // ─── リレー状態（GameScene.jsの escortIdx/relayPhase/intervalTimer/survivors と同一設計） ───
    const RELAY_INTERVAL = 4000;  // GameScene.js の RELAY_INTERVAL と一致させること（1×基準・4000ms固定）
    const escortDefs = stage.escorts;
    const minSurvivors = stage.minSurvivors ?? 1;
    let escortIdx     = 0;
    let relayPhase    = 'active';  // 'active' | 'interval' | 'done'
    let intervalTimer = 0;
    let survivors     = 0;
    let escort, sem;

    // Y（寄り道防衛）状態。moneyは後段で宣言されるが、参照はコールバック実行時（クロージャ）なので順序問題なし
    let buildLocked = false;
    let yInflow     = null;

    // GameScene.js の _startEscort 相当: escortごとにEscort/SegmentManager(or SpawnEventManager)を作り直す
    function startEscort(idx, timeOffset) {
      const escDef = { ...escortDefs[idx] };
      if (opts.escortSpeed) escDef.speed = +opts.escortSpeed;
      const pixelPath = escDef.path.map(p => cellCenter(p.col, p.row));
      escort = new Escort(mockScene, pixelPath, escDef);
      if (escDef.segments) {
        sem = new SegmentManager(stage.spawns ?? {}, escDef.segments);
      } else {
        sem = new SpawnEventManager(stage.spawns ?? {}, escDef.spawnEvents ?? stage.spawnEvents ?? []);
        sem.start(timeOffset);
      }

      // Y（寄り道防衛）コールバック配線（GameScene.jsのonDetour*と同一設計）
      escort.onDetourStart = () => {
        log.push(`[DETOUR_START]    t=${Math.round(mockScene.scaledTime)}ms → announcing`);
      };
      escort.onDetourActivate = () => {
        buildLocked = true;
        const walletAmount = escDef.detour?.walletAmount ?? 0;
        if (walletAmount > 0) {
          money += walletAmount;
          log.push(`[WALLET] t=${Math.round(mockScene.scaledTime)}ms 着席取得 +${walletAmount}  money=${money}`);
        }
        yInflow = new YInflowManager(stage.spawns ?? {}, escDef.detour?.yInflow ?? []);
        yInflow.start(mockScene.scaledTime);
        log.push(`[DETOUR_ACTIVATE] t=${Math.round(mockScene.scaledTime)}ms waitTime=${escDef.detour?.waitTime ?? 30000}ms buildLocked=true`);
      };
      escort.onDetourEnd = () => {
        buildLocked = false;
        yInflow?.retreatAll();
        yInflow = null;
        log.push(`[DETOUR_END]      t=${Math.round(mockScene.scaledTime)}ms buildLocked=false`);
      };
    }
    startEscort(0, 0);

    // GameScene.js の _onEscortDone 相当
    function onEscortDone(reached, t) {
      if (reached) {
        survivors++;
        log.push(`[REACH]  t=${Math.round(t)}ms  護衛ゴール到達  生存護衛=${survivors}`);
      }
      const nextIdx   = escortIdx + 1;
      const remaining = escortDefs.length - nextIdx;
      if (survivors + remaining < minSurvivors || nextIdx >= escortDefs.length) {
        relayPhase = 'done';
        return;
      }
      relayPhase    = 'interval';
      intervalTimer = RELAY_INTERVAL;
      log.push(`[RELAY_INTERVAL]  t=${Math.round(t)}ms  次の護衛=escortIdx${nextIdx}  interval=${RELAY_INTERVAL}ms`);
    }

    // GameScene.js の _activateNextEscort 相当
    function activateNextEscort(t) {
      escortIdx++;
      log.push(`[RELAY_START]  t=${Math.round(t)}ms  escortIdx=${escortIdx}  timeOffset=${Math.round(t)}ms`);
      startEscort(escortIdx, t);
      relayPhase = 'active';
    }

    // 初期配置タワー（JSON指定・コスト無消費・チェックバイパス）
    const simTowers = [];
    for (const t of (stage.initialTowers || [])) {
      if (!TOWER_DEFS[t.type]) { log.push(`[WARN]   不明タワー種別: ${t.type}`); continue; }
      simTowers.push(new SimTower(t.col, t.row, t.type, log));
      log.push(`[INIT]   ${t.type}@(${t.col},${t.row}) 初期配置（コスト無消費）`);
    }

    // タワー配置（即時分: buildAt=0）/ 時間指定分はキューへ
    let money = stage.startMoney ?? 500;
    const delayedQueue = [];
    for (const tp of towerPlacements) {
      if (tp.buildAt > 0) { delayedQueue.push(tp); continue; }
      if (tp.type === 'upgrade') {
        const t = simTowers.find(t => t._col === tp.col && t._row === tp.row);
        if (t) { t.upgrade(); log.push(`[UPGRADE] upgrade@(${tp.col},${tp.row}) Lv${t.upgradeLevel}`); }
        else    { log.push(`[WARN]   upgrade@(${tp.col},${tp.row}) タワー未発見`); }
        continue;
      }
      const def = TOWER_DEFS[tp.type];
      if (!def) { log.push(`[WARN]   不明タワー種別: ${tp.type}`); continue; }
      if (money < def.cost) { log.push(`[WARN]   資金不足でスキップ: ${tp.type}@(${tp.col},${tp.row}) cost=${def.cost} 残=${money}`); continue; }
      simTowers.push(new SimTower(tp.col, tp.row, tp.type, log));
      money -= def.cost;
      log.push(`[BUILD]  ${tp.type}@(${tp.col},${tp.row})  cost=${def.cost}  残=${money}`);
    }
    delayedQueue.sort((a, b) => a.buildAt - b.buildAt);

    // ゾンビ管理
    let zombies    = [];
    let allSpawned = [];
    let spawnTotal = 0, killCount = 0, idSeq = 0;
    let closecallCount = 0, closestEver = Infinity;

    const spawnFn = (col, row, def, waveNum, leader) => {
      const finalDef = opts.enemySpeed ? { ...def, speed: +opts.enemySpeed } : def;
      spawnTotal++;
      const z          = new Zombie(mockScene, col, row, finalDef, waveNum, leader);
      z._simId         = idSeq++;
      z._firstContact  = null;

      z.onDeath = () => {
        killCount++;
        money += z.reward ?? 0;
        log.push(`[KILL]   t=${Math.round(scaledTime)}ms  id=${z._logId}  killCount=${killCount}  reward+${z.reward ?? 0}  残=${money}`);
      };

      zombies.push(z);
      allSpawned.push(z);
      log.push(`[SPAWN]  t=${Math.round(scaledTime)}ms  id=${z._logId}  spawn=(${col},${row})  hp=${finalDef.hp}  total=${spawnTotal}`);
      return z;
    };

    // ─── シミュレーションループ ─────────────────────────────────────────
    const DT       = 50;         // ms/tick（20Hz）
    const MAX_TIME = 600_000;    // 10分タイムアウト

    while (scaledTime <= MAX_TIME) {
      mockScene.scaledTime = scaledTime;

      // 時間指定タワーの建設/強化チェック
      while (delayedQueue.length > 0 && delayedQueue[0].buildAt <= scaledTime) {
        const tp = delayedQueue.shift();
        if (buildLocked) { log.push(`[WARN]   t=${Math.round(scaledTime)}ms Y中のためスキップ: ${tp.type}@(${tp.col},${tp.row})`); continue; }
        if (tp.type === 'upgrade') {
          const t = simTowers.find(t => t._col === tp.col && t._row === tp.row);
          if (t) { t.upgrade(); log.push(`[UPGRADE] t=${Math.round(scaledTime)}ms  upgrade@(${tp.col},${tp.row}) Lv${t.upgradeLevel}`); }
          else    { log.push(`[WARN]   t=${Math.round(scaledTime)}ms  upgrade@(${tp.col},${tp.row}) タワー未発見`); }
          continue;
        }
        const def = TOWER_DEFS[tp.type];
        if (!def) { log.push(`[WARN]   不明タワー種別: ${tp.type}`); continue; }
        if (money < def.cost) {
          log.push(`[WARN]   t=${Math.round(scaledTime)}ms 資金不足: ${tp.type}@(${tp.col},${tp.row}) cost=${def.cost} 残=${money}`);
          continue;
        }
        simTowers.push(new SimTower(tp.col, tp.row, tp.type, log));
        money -= def.cost;
        log.push(`[BUILD]  t=${Math.round(scaledTime)}ms  ${tp.type}@(${tp.col},${tp.row})  cost=${def.cost}  残=${money}`);
      }

      // GameScene.jsの更新順(ff→sem→zombie→tower→escort)をそのまま踏襲。
      // escortTarget: relayPhase==='active'の時だけ現escortを渡す（GameScene.jsのescortTargetと同一）
      if (escort.alive && !escort.reached) ff.update(escort.col, escort.row);
      const escortTarget = relayPhase === 'active' ? escort : null;

      sem.update(scaledTime, spawnFn, escortTarget);
      yInflow?.update(scaledTime, spawnFn);

      const alive = zombies.filter(z => z.alive);

      // ゾンビ更新 + 初接触追跡
      for (const z of alive) {
        z.update(scaledTime, DT, escortTarget);
        if (!z._firstContact && escortTarget) {
          const dx = escortTarget.x - z.x, dy = escortTarget.y - z.y;
          if (Math.sqrt(dx*dx + dy*dy) < CELL * 0.95) {
            z._firstContact = { col: z.col, row: z.row, t: scaledTime };
          }
        }
      }

      for (const t of simTowers) {
        t.update(scaledTime, alive, escortTarget);
      }

      escort.update(DT);  // escort は最後に更新（GameScene.jsと同じ順序）

      // GameScene.jsの_checkWinLose相当（relayPhase==='active'の時だけ判定）
      if (relayPhase === 'active') {
        if (escort.reached || escort.state === 'exiting') {
          onEscortDone(true, scaledTime);
        } else if (escort.defeated) {
          log.push(`[GAMEOVER] t=${Math.round(scaledTime)}ms  護衛HP=0  escortIdx=${escortIdx}`);
          onEscortDone(false, scaledTime);
        }
      }
      if (relayPhase === 'done') break;

      // CLOSE_CALL集計はrelayPhase==='active'時のみ（退場ゾンビは除外）
      for (const z of zombies) {
        if (!z.alive && !z._retreating && z._closestToEscort < CELL * 1.5 && relayPhase === 'active') {
          closecallCount++;
          if (z._closestToEscort < closestEver) closestEver = z._closestToEscort;
          log.push(`[CLOSE_CALL] t=${Math.round(scaledTime)}ms  dist=${Math.round(z._closestToEscort)}px → 撃破`);
        }
      }

      zombies = zombies.filter(z => z.alive);

      // インターバルカウントダウン（GameScene.jsのintervalTimer -= totalDtと同一設計）
      if (relayPhase === 'interval') {
        intervalTimer -= DT;
        if (intervalTimer <= 0) activateNextEscort(scaledTime);
      }

      scaledTime += DT;
    }
    if (scaledTime > MAX_TIME) log.push(`[TIMEOUT] 最大時間(10分)超過`);

    // RESULT
    const total       = escortDefs.length;
    const passThrough = spawnTotal - killCount;
    const judgment    = survivors >= minSurvivors ? 'CLEAR' : 'GAMEOVER';
    const hpPct       = Math.round((escort.hp ?? 0) / (escort.maxHp || 1) * 100);
    const closestPx   = closestEver === Infinity ? '-' : Math.round(closestEver);
    log.push(`[RESULT] スポーン総数=${spawnTotal} 撃破=${killCount} すり抜け=${passThrough} 護衛生還=${survivors}/${total} HP残=${hpPct}% CLOSE_CALL=${closecallCount}回 最接近=${closestPx}px 判定=${judgment}`);

    // 交戦地分析（encounterHints）
    if (stage.encounterHints?.length > 0) {
      log.push('');
      log.push('──── 交戦地分析 ──────────────────────────────────────');
      for (const hint of stage.encounterHints) {
        const nearby = allSpawned.filter(z => {
          if (!z._firstContact) return false;
          return Math.abs(z._firstContact.col - hint.col) + Math.abs(z._firstContact.row - hint.row) <= 3;
        });
        const note = hint.note ?? `(${hint.col},${hint.row})`;
        if (nearby.length === 0) {
          log.push(`  ${note}`);
          log.push(`    → 交戦なし（全撃破 or 護衛敗北前に未到達）`);
        } else {
          const aC = Math.round(nearby.reduce((s,z) => s + z._firstContact.col, 0) / nearby.length);
          const aR = Math.round(nearby.reduce((s,z) => s + z._firstContact.row, 0) / nearby.length);
          const dC = aC - hint.col, dR = aR - hint.row;
          const firstT = Math.min(...nearby.map(z => z._firstContact.t));
          log.push(`  ${note}`);
          log.push(`    計画(${hint.col},${hint.row}) 実際(${aC},${aR}) ズレΔ(${dC>=0?'+':''}${dC},${dR>=0?'+':''}${dR})  最初接触t=${Math.round(firstT)}ms  交戦${nearby.length}体`);
        }
      }
      log.push('──────────────────────────────────────────────────────');
    }

    return { log: log.join('\n'), judgment, hpPct, closecallCount };
  }
}

// ─── balance.json ロード ─────────────────────────────────────────────────
let _balanceApplied = false;
async function ensureBalance() {
  if (_balanceApplied) return;
  try {
    const r = await fetch('balance.json');
    applyBalance(await r.json());
  } catch (e) {
    console.warn('balance.json 読み込み失敗（config.js デフォルト値を使用）');
  }
  _balanceApplied = true;
}

// ─── GitHub設定 ──────────────────────────────────────────────────────────
const GH_KEYS = ['gh_pat','gh_owner','gh_repo','gh_branch','gh_path'];

function loadGhSettings() {
  document.getElementById('ghPat').value    = localStorage.getItem('gh_pat')    || '';
  document.getElementById('ghOwner').value  = localStorage.getItem('gh_owner')  || '';
  document.getElementById('ghRepo').value   = localStorage.getItem('gh_repo')   || '';
  document.getElementById('ghBranch').value = localStorage.getItem('gh_branch') || 'master';
  document.getElementById('ghPath').value   = localStorage.getItem('gh_path')   || 'docs/sim_log.md';
}

function saveGhSettings() {
  localStorage.setItem('gh_pat',    document.getElementById('ghPat').value.trim());
  localStorage.setItem('gh_owner',  document.getElementById('ghOwner').value.trim());
  localStorage.setItem('gh_repo',   document.getElementById('ghRepo').value.trim());
  localStorage.setItem('gh_branch', document.getElementById('ghBranch').value.trim() || 'master');
  localStorage.setItem('gh_path',   document.getElementById('ghPath').value.trim()   || 'docs/sim_log.md');
  showSaveStatus('設定を保存しました', 'ok');
}

function showSaveStatus(msg, type) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = `save-status ${type}`;
  el.style.display = 'inline-block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// UTF-8文字列 → base64（btoa は ASCII のみのため変換が必要）
function utf8ToBase64(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p) => String.fromCharCode(parseInt(p, 16))));
}

// ─── GitHub Contents API ─────────────────────────────────────────────────
async function githubSave(entries) {
  const pat    = localStorage.getItem('gh_pat')    || '';
  const owner  = localStorage.getItem('gh_owner')  || '';
  const repo   = localStorage.getItem('gh_repo')   || '';
  const branch = localStorage.getItem('gh_branch') || 'master';
  const path   = localStorage.getItem('gh_path')   || 'docs/sim_log.md';

  if (!pat || !owner || !repo) return { status: 'skip', reason: 'GitHub設定未入力' };

  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
  const headers = {
    'Authorization': `Bearer ${pat}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
  };

  // 既存ファイル取得
  let currentContent = '';
  let sha = null;
  const getRes = await fetch(`${apiUrl}?ref=${branch}`, { headers });
  if (getRes.ok) {
    const data = await getRes.json();
    sha = data.sha;
    currentContent = decodeURIComponent(
      atob(data.content.replace(/\n/g, '')).split('').map(c => '%' + c.charCodeAt(0).toString(16).padStart(2,'0')).join('')
    );
  } else if (getRes.status !== 404) {
    const err = await getRes.json().catch(() => ({}));
    return { status: 'err', reason: `GET失敗 ${getRes.status}: ${err.message ?? ''}` };
  }

  // 重複フィルタ（dedupKeyが本文に含まれていたらスキップ）
  const toAdd = entries.filter(e => !currentContent.includes(e.dedupKey));
  if (toAdd.length === 0) return { status: 'skip', reason: '全エントリ重複のためスキップ' };

  const newContent = currentContent + toAdd.map(e => e.markdown).join('');
  const putBody = {
    message: `sim: ${toAdd.map(e => e.title).join(', ')}`,
    content:  utf8ToBase64(newContent),
    branch,
  };
  if (sha) putBody.sha = sha;

  const putRes = await fetch(apiUrl, {
    method: 'PUT',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify(putBody),
  });

  if (!putRes.ok) {
    const err = await putRes.json().catch(() => ({}));
    return { status: 'err', reason: `PUT失敗 ${putRes.status}: ${err.message ?? ''}` };
  }

  return { status: 'ok', count: toAdd.length };
}

// ─── シミュレート結果 → Markdownエントリ ────────────────────────────────
function buildEntry(stageName, stageId, patternName, towerText, res) {
  const date     = new Date().toISOString().slice(0, 10);
  const towerStr = towerText.trim().replace(/\s+/g, ' ') || '(なし)';
  // 重複検知キー（同ステージ・同タワー構成・同判定・同HP）
  const dedupKey = `<!-- dedup:${stageId}|${towerStr}|${res.judgment}|${res.hpPct} -->`;
  const title    = `${date} ${stageId} ${patternName} ${res.judgment} HP${res.hpPct}%`;

  const markdown =
    `\n## ${title}\n` +
    `${dedupKey}\n` +
    `- ステージ: ${stageName}\n` +
    `- タワー: \`${towerStr}\`\n` +
    `- 判定: **${res.judgment}** HP残 ${res.hpPct}%\n\n` +
    `<details><summary>詳細ログ</summary>\n\n` +
    `\`\`\`\n${res.log}\n\`\`\`\n\n` +
    `</details>\n\n---\n`;

  return { dedupKey, markdown, title };
}

// ─── UIイベント ───────────────────────────────────────────────────────────
function addPattern() {
  const n = document.getElementById('patterns').children.length + 1;
  const row = document.createElement('div');
  row.className = 'pattern-row';
  row.innerHTML = `
    <input type="text" class="pname" value="パターン${n}" style="width:80px">
    <textarea class="ptowers" rows="2" style="flex:1;width:auto" placeholder="basic:5,3 sniper:8,3 ..."></textarea>
    <button class="sm red" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('patterns').appendChild(row);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'コピー済';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {
    btn.textContent = '失敗';
    setTimeout(() => { btn.textContent = 'コピー'; }, 1500);
  });
}

async function runAll() {
  await ensureBalance();

  let stage;
  try   { stage = JSON.parse(document.getElementById('stageJson').value.trim()); }
  catch (e) { alert('ステージ JSON のパースエラー:\n' + e.message); return; }

  const opts = {
    escortSpeed: document.getElementById('escortSpeed').value || null,
    enemySpeed:  document.getElementById('enemySpeed').value  || null,
  };

  const results = document.getElementById('results');
  results.innerHTML = '';
  const sim      = new StageSimulator();
  const entries  = [];
  const allLogs  = [];

  document.querySelectorAll('#patterns .pattern-row').forEach(row => {
    const name      = row.querySelector('.pname').value   || 'パターン';
    const towerText = row.querySelector('.ptowers').value;
    const towers    = parseTowerPattern(towerText);
    const res       = sim.run(stage, towers, opts);

    allLogs.push(`=== ${name} [${res.judgment} HP残${res.hpPct}% CLOSE_CALL=${res.closecallCount}回] ===\n${res.log}`);

    const cls = res.judgment === 'CLEAR' ? 'clear' : 'gameover';
    const div = document.createElement('div');
    div.className = 'result';

    const header = document.createElement('div');
    header.className = 'result-header';
    header.innerHTML = `<h2>${name} — <span class="${cls}">${res.judgment} HP残 ${res.hpPct}%</span></h2>`;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'sm gray';
    copyBtn.textContent = 'コピー';
    copyBtn.onclick = () => copyText(res.log, copyBtn);
    header.appendChild(copyBtn);

    const pre = document.createElement('pre');
    pre.textContent = res.log;

    div.appendChild(header);
    div.appendChild(pre);
    results.appendChild(div);

    entries.push(buildEntry(
      stage.name ?? stage.id ?? 'unknown',
      stage.id   ?? 'unknown',
      name, towerText, res
    ));
  });

  window._lastAllLogs = allLogs;
  document.getElementById('copyAllBtn').style.display = allLogs.length > 1 ? '' : 'none';

  // GitHub自動保存
  if (entries.length > 0) {
    showSaveStatus('GitHub に保存中…', 'skip');
    try {
      const r = await githubSave(entries);
      if      (r.status === 'ok')   showSaveStatus(`GitHub 保存完了（${r.count}件追記）`, 'ok');
      else if (r.status === 'skip') showSaveStatus(`スキップ: ${r.reason}`, 'skip');
      else                          showSaveStatus(`エラー: ${r.reason}`, 'err');
    } catch (e) {
      showSaveStatus(`例外: ${e.message}`, 'err');
    }
  }
}

function copyAllResults() {
  const logs = window._lastAllLogs ?? [];
  if (!logs.length) return;
  const text = logs.join('\n\n' + '─'.repeat(60) + '\n\n');
  const btn = document.getElementById('copyAllBtn');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'コピー済';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {
    btn.textContent = '失敗';
    setTimeout(() => { btn.textContent = '📋 全パターン一括コピー'; }, 1500);
  });
}

function openInEditor() {
  const raw = document.getElementById('stageJson').value.trim();
  if (!raw) { alert('ステージ JSON を入力してください'); return; }
  try { JSON.parse(raw); } catch(e) { alert('JSON パースエラー:\n' + e.message); return; }
  localStorage.setItem('editorIncoming', raw);
  window.open('editor.html', '_blank');
}

window.addEventListener('DOMContentLoaded', loadGhSettings);
